name: Deploy to GitHub Pages

# Static site — no build step. The SINGLE deploy authority for the site.
# Runs on:
#   • push to main (your own commits)
#   • completion of the "Hourly self-improvement" workflow (the bot commits to
#     main but a GITHUB_TOKEN push can't trigger `push` here, so we listen for
#     that workflow finishing instead)
#   • manual dispatch
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Hourly self-improvement"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time to the github-pages environment; let an in-progress
# deploy finish before the next starts (prevents "deployment_queued" stalls).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Regenerate the landing-page hero screenshots from the just-built app so
      # the marketing site always matches the live UI. Written into the Pages
      # artifact only — NOT committed — so we don't bloat git with ~2 MB of
      # PNGs on every deploy. Best-effort: the committed baselines ship if it
      # fails (e.g. a transient headless hiccup).
      - name: Regenerate marketing screenshots
        continue-on-error: true
        run: |
          npm install -D playwright
          npx playwright install --with-deps chromium
          node .github/gen-shots.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo (index.html, css/, js/, assets/, CNAME).
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
