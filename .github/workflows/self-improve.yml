name: Hourly self-improvement

# DISPATCH-ONLY FALLBACK — superseded by the polecat-platform steward.
#
# Scheduled self-improvement for this app now runs CENTRALLY from
# kevinrhaas/polecat-platform (`steward-improve.yml`, prompts in
# `.github/steward/`): focus it on this app via the STEWARD_FOCUS_APP repo
# variable or a dispatch with app=manager.polecat.live. See
# polecat-platform/docs/AUTOMATION.md for the full playbook. The steward ships
# via steward/* branch → smoke → PR → merge-when-green, and this repo's
# auto-revert.yml ("Guard main") self-heals main as the backstop.
#
# This workflow stays as a manual fallback only (Actions tab → "Run workflow").
# Its schedule must remain commented out — per the platform playbook it is
# slated for DELETION once the steward has a few weeks of solid runs. Note:
# unlike the steward, a run here still commits straight to main (the legacy
# model); prefer dispatching the steward in focus mode instead.
#
# Deployment is NOT done here — committing to main triggers the "Deploy to
# GitHub Pages" workflow via its `workflow_run` listener, so there is exactly
# one deploy authority and no two workflows ever race for the github-pages
# environment.
on:
  # schedule:            # intentionally disabled — the platform steward owns scheduling
  #   - cron: '17,47 * * * *'
  workflow_dispatch: {}    # manual fallback only

permissions:
  contents: write

# Never let two improvement runs overlap.
concurrency:
  group: self-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code + test browser
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -D playwright
          npx playwright install --with-deps chromium

      # Cadence: 1 in every 5 runs is a design/feature SWEEP (polish across the
      # whole app + public site); the other 4 are feature runs. The run counter
      # lives in .github/run-count so the ratio holds across dispatches.
      - name: Pick mode
        id: mode
        run: |
          COUNT=$(cat .github/run-count 2>/dev/null || echo 0)
          COUNT=$((COUNT + 1))
          echo "$COUNT" > .github/run-count
          if [ $(( COUNT % 5 )) -eq 0 ]; then
            echo "mode=sweep"   >> "$GITHUB_OUTPUT"
          else
            echo "mode=feature" >> "$GITHUB_OUTPUT"
          fi
          echo "Run #$COUNT — mode selected"

      - name: Run Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          PROMPT="$(cat .github/self-improve-prompt.md)
          ---
          This run's mode is: ${MODE}"
          claude -p "$PROMPT" \
            --dangerously-skip-permissions \
            --max-turns 120 \
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep" || echo "claude exited non-zero (continuing to smoke test)"

      # Stamp the newest changelog entry with the real ship time using the
      # repo's own tool (fleet convention — the platform steward calls the same
      # script). It fills an empty top `ts`, and overwrites an unparseable or
      # future one, so timestamps are never fabricated.
      - name: Stamp changelog timestamp (real ship time; never fabricated/future)
        run: |
          if git diff --name-only | grep -q '^js/changelog.js$'; then
            node .github/stamp-changelog.mjs
          else
            echo "changelog.js unchanged; nothing to stamp."
          fi

      - name: Smoke test (app must load + function with no errors)
        run: node .github/smoke-test.mjs

      - name: Commit + push to main (triggers the deploy workflow)
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes produced this run."; exit 0
          fi
          git config user.name  "manager-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "auto: self-improvement (${MODE})" \
            -m "Automated hourly improvement; passed the smoke battery. Deploy runs via the Deploy to GitHub Pages workflow."
          git push origin HEAD:main
