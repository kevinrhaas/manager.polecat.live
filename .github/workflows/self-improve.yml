name: Hourly self-improvement

# Runs Claude Code on a schedule to build the next roadmap item (or, every 5th
# feature run, do a design/feature SWEEP across the app + public site), gate it
# behind the Playwright smoke battery, then commit to main. Deployment is NOT
# done here — committing to main triggers the "Deploy to GitHub Pages" workflow
# via its `workflow_run` listener, so there is exactly one deploy authority and
# no two workflows ever race for the github-pages environment.
#
# Pause any time by disabling this workflow or removing the
# CLAUDE_CODE_OAUTH_TOKEN secret.
on:
  schedule:
    # Off-peak minutes: GitHub heavily delays/drops scheduled jobs at :00.
    # Two runs/hour improves the odds of a roughly-hourly cadence; the
    # concurrency lock keeps them from overlapping.
    - cron: '17,47 * * * *'
  workflow_dispatch: {}    # run manually from the Actions tab

permissions:
  contents: write

# Never let two improvement runs overlap.
concurrency:
  group: self-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code + test browser
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -D playwright
          npx playwright install --with-deps chromium

      # Cadence: 1 in every 5 runs is a design/feature SWEEP (polish across the
      # whole app + public site); the other 4 are feature runs. The run counter
      # lives in .github/run-count so the ratio holds across dispatches.
      - name: Pick mode
        id: mode
        run: |
          COUNT=$(cat .github/run-count 2>/dev/null || echo 0)
          COUNT=$((COUNT + 1))
          echo "$COUNT" > .github/run-count
          if [ $(( COUNT % 5 )) -eq 0 ]; then
            echo "mode=sweep"   >> "$GITHUB_OUTPUT"
          else
            echo "mode=feature" >> "$GITHUB_OUTPUT"
          fi
          echo "Run #$COUNT — mode selected"

      - name: Run Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          PROMPT="$(cat .github/self-improve-prompt.md)
          ---
          This run's mode is: ${MODE}"
          claude -p "$PROMPT" \
            --dangerously-skip-permissions \
            --max-turns 120 \
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep" || echo "claude exited non-zero (continuing to smoke test)"

      # Stamp the newest changelog entry with the real ship time. The agent
      # leaves `ts: ''` on any new top entry; we fill it here so timestamps
      # reflect when the change actually shipped and can never be fabricated.
      # Stamp the NEWEST changelog entry with the real ship time. We overwrite
      # the top entry's `ts` whenever it is empty, unparseable, OR set to a time
      # in the future — so an agent that ignores the "leave ts empty" rule and
      # hard-codes a (often round, future) timestamp still ends up with the real
      # commit time. Legitimate past stamps on the top entry are left untouched.
      - name: Stamp changelog timestamp (real ship time; never fabricated/future)
        run: |
          if git diff --name-only | grep -q '^js/changelog.js$'; then
            node -e "const fs=require('fs');const f='js/changelog.js';let s=fs.readFileSync(f,'utf8');const now=new Date().toISOString();let changed=false;s=s.replace(/ts:\s*'([^']*)'/, (m,val)=>{const t=Date.parse(val);if(!val||isNaN(t)||t>Date.now()+60000){changed=true;return \"ts: '\"+now+\"'\";}return m;});fs.writeFileSync(f,s);console.log(changed?('Stamped top changelog entry: '+now):'Top changelog ts already valid; left as-is.');"
          else
            echo "changelog.js unchanged; nothing to stamp."
          fi

      - name: Smoke test (app must load + function with no errors)
        run: node .github/smoke-test.mjs

      - name: Commit + push to main (triggers the deploy workflow)
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes produced this run."; exit 0
          fi
          git config user.name  "manager-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "auto: self-improvement (${MODE})" \
            -m "Automated hourly improvement; passed the smoke battery. Deploy runs via the Deploy to GitHub Pages workflow."
          git push origin HEAD:main
