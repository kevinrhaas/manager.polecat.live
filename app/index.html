<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="description" content="Manager — mission control for a fleet of self-improving Claude Code projects. Dashboards, project library, what's-new timelines, and the Claude Code session behind each one."/>
  <meta name="theme-color" content="#0a0b12"/>
  <title>Manager · polecat.live</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <!-- Polecat Shell (vendored, read-only) first; styles.css is Manager's
       design system + skin over it and must load LAST so it wins conflicts -->
  <link rel="stylesheet" href="/vendor/polecat-shell/tokens.css"/>
  <link rel="stylesheet" href="/vendor/polecat-shell/shell.css"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <!-- avoid theme flash: stamp palette/theme/motion before paint (shell
       theme.js format; migrates Manager's legacy bare 'dark'/'light' values) -->
  <script>
    (function(){try{
      var k='manager.theme',v=localStorage.getItem(k)||'manager:dark';
      if(v.indexOf(':')<0){v='manager:'+v;localStorage.setItem(k,v);}
      var p=v.split(':'),m=p[1]||'dark';
      if(m==='system')m=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
      var d=document.documentElement;d.setAttribute('data-palette',p[0]);d.setAttribute('data-theme',m);
      var r=localStorage.getItem(k+'.motion');
      if(r==='1'||(r!=='0'&&matchMedia('(prefers-reduced-motion: reduce)').matches))d.setAttribute('data-reduce-motion','1');
    }catch(e){}})();
  </script>
</head>
<body>
  <a class="skip-link" href="#view">Skip to content</a>
  <div class="aurora" aria-hidden="true"><span></span><span></span><span></span></div>
  <div id="app"></div>
  <div id="toasts"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
